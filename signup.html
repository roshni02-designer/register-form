<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medico Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">
  <h2>MEDICARE APPOINTMENT FORM</h2>

  <div class="row">

    <div class="col-md-6">
      <input id="name" class="form-control" placeholder="Name">
    </div>

    <div class="col-md-6">
      <input id="email" class="form-control" placeholder="Email">
    </div> 

    <div class="col-md-6">
      <input id="phone" class="form-control" placeholder="Phone Number">
    </div>

    <div class="col-md-6">
      <input id="password" type="password" class="form-control" placeholder="Password">
    </div>

    <div class="col-md-6">
      <input type="date" class="form-control">
    </div>

    <div class="col-md-6">
      <input type="time" class="form-control">
    </div>

    <div class="col-md-12">
      <textarea class="form-control" placeholder="Reason / Address"></textarea>
    </div>

  </div>

  <button onclick="register()" class="btn btn-main">MAKE REGISTRATION</button>
</div>

<script src="app.js"></script>

</body>
</html>
